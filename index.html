<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>⚜ 寶箱總覽 ⚜</title>
  <style>
    /* ===== 全域嚴格鎖定 ===== */
    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      user-select: none; -webkit-user-select: none; 
      -webkit-touch-callout: none; touch-action: none;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      overscroll-behavior: none;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #0a0806; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      background: radial-gradient(ellipse at 30% 40%, #2a1e14 0%, #0d0907 70%), repeating-linear-gradient(45deg, rgba(60,40,20,0.06) 0px, rgba(60,40,20,0.06) 2px, transparent 2px, transparent 8px);
      z-index: -2;
    }
    body::after {
      content: ''; position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      background-image: radial-gradient(2px 2px at 20% 30%, rgba(255,200,150,0.06), transparent), radial-gradient(2px 2px at 80% 70%, rgba(255,200,150,0.04), transparent), radial-gradient(3px 3px at 40% 80%, rgba(255,180,100,0.03), transparent);
      pointer-events: none; z-index: -1; opacity: 0.4;
    }

    /* ===== 總頁面 (雙排 Grid 版面) ===== */
    .menu-container {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 4%; overflow-y: hidden;
    }
    .menu-title {
      font-size: 6vmin; font-size: clamp(2.5rem, 6vmin, 5rem);
      color: #b8956a; text-shadow: 0 0 30px rgba(0,0,0,0.8);
      letter-spacing: 6px; font-weight: 700; margin-bottom: 6vmin;
    }
    .menu-list { 
      width: 100%; max-width: 650px; display: grid; 
      grid-template-columns: 1fr 1fr; gap: 3vmin 4vmin; 
    }
    .menu-btn {
      width: 100%; background: rgba(40,28,18,0.9); color: #f0dcc0;
      font-family: inherit; font-size: 3.5vmin; font-size: clamp(1rem, 2.5vmin, 1.5rem);
      font-weight: 700; letter-spacing: 1px; text-align: center;
      padding: 3vmin 1vmin; border-radius: 14px; border: 2px solid rgba(180,140,100,0.4);
      cursor: pointer; outline: none;
    }
    .menu-btn:nth-child(7) { grid-column: 1 / -1; margin-top: 1vmin; }
    .menu-btn:active { background: rgba(60,42,28,0.9); transform: scale(0.98); }

    /* ===== 保險箱容器 ===== */
    .safe-container {
      position: relative; width: 92vmin; height: 69vmin; max-width: 820px; max-height: 615px;
      aspect-ratio: 4 / 3; display: flex; align-items: center; justify-content: center;
      perspective: 1200px; -webkit-perspective: 1200px; transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
      overflow: hidden; border-radius: 18px 18px 30px 30px;
    }
    .hidden { display: none !important; }

    /* ===== 保險箱本體 ===== */
    .safe-box {
      position: relative; width: 100%; height: 100%; background: linear-gradient(160deg, #4a3222, #2a1a10);
      border-radius: 18px 18px 30px 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 0 6px #1f140e inset, 0 0 0 10px #3b271c inset, 0 0 0 14px #1a100a inset;
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5%;
      transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
    }
    .safe-box::before {
      content: ''; position: absolute; top: 12px; right: 12px; bottom: 12px; left: 12px;
      border: 3px solid rgba(160,120,80,0.12); border-radius: 14px;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 40px, rgba(160,120,80,0.03) 40px, rgba(160,120,80,0.03) 41px), repeating-linear-gradient(0deg, transparent 0px, transparent 50px, rgba(120,80,50,0.02) 50px, rgba(120,80,50,0.02) 51px); pointer-events: none;
    }
    .corner-metal { position: absolute; width: 20%; height: 20%; border: 4px solid #6a4f3a; border-radius: 6px; opacity: 0.35; pointer-events: none; }
    .corner-tl { top: 4%; left: 4%; border-right: none; border-bottom: none; }
    .corner-tr { top: 4%; right: 4%; border-left: none; border-bottom: none; }
    .corner-bl { bottom: 4%; left: 4%; border-right: none; border-top: none; }
    .corner-br { bottom: 4%; right: 4%; border-left: none; border-top: none; }
    .lock-ornament { position: absolute; top: 8%; right: 8%; font-size: 5vmin; font-size: clamp(2rem, 5vmin, 4rem); opacity: 0.18; color: #b8956a; transform: rotate(15deg); filter: drop-shadow(0 0 6px #000); }

    .safe-door {
      position: absolute; top: 0; right: 0; bottom: 0; left: 0; border-radius: inherit;
      transition: transform 1.8s cubic-bezier(0.65, 0, 0.35, 1); transform-origin: left center; -webkit-transform-origin: left center;
      transform-style: preserve-3d; -webkit-transform-style: preserve-3d; transform: translateZ(0) rotateY(0deg); z-index: 2; pointer-events: auto;
    }
    .safe-door.open { transform: translateZ(0) rotateY(-160deg); pointer-events: none; }
    .door-front, .door-back { position: absolute; top: 0; right: 0; bottom: 0; left: 0; border-radius: inherit; -webkit-backface-visibility: hidden; backface-visibility: hidden; }
    .door-front { background: linear-gradient(160deg, #5a3f2e, #2d1f16); padding: 6%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 0 2px #1f140e inset, 0 0 0 6px #3b271c inset; }
    .door-front::before { content: ''; position: absolute; top: 15px; right: 15px; bottom: 15px; left: 15px; border: 2px solid rgba(180,140,100,0.06); border-radius: 12px; background: repeating-linear-gradient(0deg, transparent 0px, transparent 30px, rgba(100,70,40,0.04) 30px, rgba(100,70,40,0.04) 31px); pointer-events: none; }
    .door-back { transform: rotateY(180deg); background: linear-gradient(200deg, #3a281c, #201510); box-shadow: 0 0 0 2px #1f140e inset, 0 0 40px rgba(0,0,0,0.7) inset; }

    .rivet {
      position: absolute; width: 4vmin; height: 4vmin; width: clamp(14px, 3vmin, 28px); height: clamp(14px, 3vmin, 28px);
      border-radius: 50%; background: radial-gradient(circle at 40% 35%, #b8a080, #5a4030);
      box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 -2px 6px #2a1a10; border: 1px solid #7a604a; transform: translateZ(0); cursor: pointer;
    }
    .rivet-tl { top: 6%; left: 6%; }
    .rivet-tr { top: 6%; right: 6%; }
    .rivet-bl { bottom: 6%; left: 6%; }
    .rivet-br { bottom: 6%; right: 6%; }

    .wheel-panel {
      position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 85%; max-width: 420px; background: rgba(10,7,5,0.72); padding: 3vmin; border-radius: 24px;
      border: 2px solid rgba(180,140,100,0.20); box-shadow: inset 0 4px 30px rgba(0,0,0,0.7); z-index: 3; overflow: hidden; transition: border-color 0.5s ease;
    }
    .safe-title { position: relative; z-index: 2; font-size: 6vmin; font-size: clamp(28px, 6vmin, 52px); font-weight: 700; color: #b8956a; text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 40px rgba(200,160,100,0.06); letter-spacing: 4px; margin-bottom: 15px; transition: color 0.5s ease; }
    
    .wheels { position: relative; z-index: 2; display: flex; justify-content: center; width: 100%; }
    .wheel-item { display: flex; flex-direction: column; align-items: center; margin: 0 1vmin; }
    .wheel-container {
      position: relative; width: 10vmin; height: 14vmin; width: clamp(44px, 10vmin, 72px); height: clamp(60px, 14vmin, 100px);
      background: linear-gradient(180deg, #1a1410, #2d1f16); border-radius: 12px; border: 3px solid #5a4030;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; margin: 4px 0; cursor: pointer;
    }
    .wheel-digit { font-size: 8vmin; font-size: clamp(32px, 8vmin, 56px); font-weight: 700; font-family: 'Courier New', monospace; color: #f0dcc0; text-shadow: 0 0 20px rgba(200,160,100,0.08); pointer-events: none; }
    .wheel-btn { background: rgba(0,0,0,0.3); border: none; color: #b8956a; font-size: 4vmin; font-size: clamp(16px, 3vmin, 28px); cursor: pointer; padding: 4px 8px; border-radius: 6px; width: 100%; text-align: center; }
    .btn-open { position: relative; z-index: 2; padding: 2vmin 4vmin; font-size: 4vmin; font-size: clamp(16px, 3vmin, 26px); font-weight: 700; color: #f0dcc0; background: linear-gradient(180deg, #5a4030, #3a2a1e); border: 2px solid #7a604a; border-radius: 40px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.6); letter-spacing: 4px; margin-top: 15px; min-width: 120px; }

    .status-msg { position: relative; z-index: 2; color: rgba(240,220,192,0.5); font-size: 2.5vmin; letter-spacing: 2px; min-height: 1.8em; margin-top: 10px; }
    .status-msg.error { color: #d45a4a; text-shadow: 0 0 20px rgba(200,50,30,0.25); }
    .status-msg.success { color: #b8b080; text-shadow: 0 0 20px rgba(180,180,100,0.15); }

    .safe-interior { position: absolute; top: 0; right: 0; bottom: 0; left: 0; border-radius: inherit; background: radial-gradient(ellipse at center, #1a1410, #0a0806); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease 0s; padding: 8%; z-index: 1; }
    .safe-interior.active { opacity: 1; pointer-events: auto; transition: opacity 1s ease 0.2s; }
    .scroll-container { width: 90%; height: 85%; display: flex; align-items: center; justify-content: center; position: relative; transform: translateZ(0) scale(0.8) rotateY(20deg); opacity: 0; }
    .scroll-container.active { transform: translateZ(0) scale(1) rotateY(0deg); opacity: 1; transition: transform 0.9s cubic-bezier(0.23,1,0.32,1), opacity 0.9s; }
    .scroll-parchment { width: 100%; height: 100%; background: linear-gradient(170deg, #eeddcc, #dac09a, #c8b08a); border-radius: 20px 8px 20px 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 0 0 12px #6a5a3a; position: relative; padding: 6% 8%; display: flex; flex-direction: column; justify-content: center; }
    .scroll-text { font-size: 5vmin; font-size: clamp(18px, 4vmin, 36px); color: #2a1a10; line-height: 1.6; text-align: center; font-style: italic; z-index: 2; }
    .scroll-badge { position: absolute; bottom: 12%; right: 10%; width: 14vmin; height: 14vmin; width: clamp(60px, 12vmin, 120px); height: clamp(60px, 12vmin, 120px); border-radius: 50%; border: 4px solid #1a1a2a; display: flex; align-items: center; justify-content: center; font-size: 5vmin; color: #c8b090; transform: rotate(-12deg); }
    .scroll-badge.red { background: radial-gradient(circle at 40% 35%, #6a3a3a, #3a1a1a); border-color: #3a1a1a; }
    .scroll-badge.blue { background: radial-gradient(circle at 40% 35%, #3a4a6a, #1a2a3a); border-color: #1a2a3a; }
    .btn-close-scroll { position: absolute; top: 6%; right: 6%; padding: 6px 18px; background: rgba(20,14,10,0.65); color: #dcc8b0; border: 1px solid rgba(180,140,100,0.15); border-radius: 30px; cursor: pointer; z-index: 5; font-family: inherit; }
    
    @media (orientation: portrait) {
      .safe-container { width: 85vmin; height: 113vmin; aspect-ratio: 3 / 4; }
      .wheel-container { width: 12vmin; height: 16vmin; }
    }
  </style>
</head>
<body>

<div id="menuView" class="menu-container">
  <div class="menu-title">⚜ 寶箱總覽 ⚜</div>
  <div class="menu-list">
    <button class="menu-btn" ontouchstart="safeApp.goBox(0)" onclick="safeApp.goBox(0)">1. 視聽教室</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(1)" onclick="safeApp.goBox(1)">2. Watch Tower</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(2)" onclick="safeApp.goBox(2)">3. Parking Lot</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(3)" onclick="safeApp.goBox(3)">4. Kitchen</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(4)" onclick="safeApp.goBox(4)">5. Slate Stone House</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(5)" onclick="safeApp.goBox(5)">6. Trash Area</button>
    <button class="menu-btn" ontouchstart="safeApp.goBox(6)" onclick="safeApp.goBox(6)">7. Court</button>
  </div>
</div>

<div id="safeView" class="safe-container hidden">
  <div class="safe-box" id="safeBox">
    <div class="corner-metal corner-tl"></div>
    <div class="corner-metal corner-tr"></div>
    <div class="corner-metal corner-bl"></div>
    <div class="corner-metal corner-br"></div>
    <div class="lock-ornament">⚜</div>

    <div class="safe-door" id="safeDoor">
      <div class="door-front">
        <div class="rivet rivet-tl"></div>
        <div class="rivet rivet-tr"></div>
        <div class="rivet rivet-bl" id="backRivet" ontouchstart="safeApp.tapRivet()" onclick="safeApp.tapRivet()"></div>
        <div class="rivet rivet-br"></div>

        <div class="wheel-panel" id="wheelPanel">
          <div class="safe-title" id="safeTitle">寶箱</div>
          
          <div class="wheels">
            <div class="wheel-item">
              <button class="wheel-btn" ontouchstart="safeApp.spin(0,1)" onclick="safeApp.spin(0,1)">▲</button>
              <div class="wheel-container" ontouchstart="safeApp.spin(0,1)" onclick="safeApp.spin(0,1)"><span class="wheel-digit" id="d0">0</span></div>
              <button class="wheel-btn" ontouchstart="safeApp.spin(0,-1)" onclick="safeApp.spin(0,-1)">▼</button>
            </div>
            <div class="wheel-item">
              <button class="wheel-btn" ontouchstart="safeApp.spin(1,1)" onclick="safeApp.spin(1,1)">▲</button>
              <div class="wheel-container" ontouchstart="safeApp.spin(1,1)" onclick="safeApp.spin(1,1)"><span class="wheel-digit" id="d1">0</span></div>
              <button class="wheel-btn" ontouchstart="safeApp.spin(1,-1)" onclick="safeApp.spin(1,-1)">▼</button>
            </div>
            <div class="wheel-item">
              <button class="wheel-btn" ontouchstart="safeApp.spin(2,1)" onclick="safeApp.spin(2,1)">▲</button>
              <div class="wheel-container" ontouchstart="safeApp.spin(2,1)" onclick="safeApp.spin(2,1)"><span class="wheel-digit" id="d2">0</span></div>
              <button class="wheel-btn" ontouchstart="safeApp.spin(2,-1)" onclick="safeApp.spin(2,-1)">▼</button>
            </div>
            <div class="wheel-item">
              <button class="wheel-btn" ontouchstart="safeApp.spin(3,1)" onclick="safeApp.spin(3,1)">▲</button>
              <div class="wheel-container" ontouchstart="safeApp.spin(3,1)" onclick="safeApp.spin(3,1)"><span class="wheel-digit" id="d3">0</span></div>
              <button class="wheel-btn" ontouchstart="safeApp.spin(3,-1)" onclick="safeApp.spin(3,-1)">▼</button>
            </div>
          </div>
          
          <button class="btn-open" ontouchstart="safeApp.tryOpen()" onclick="safeApp.tryOpen()" id="btnOpen">解 鎖</button>
          <div class="status-msg" id="statusMsg">請輸入密碼</div>
        </div>
      </div>
      <div class="door-back"></div>
    </div>

    <div class="safe-interior" id="safeInterior">
      <div class="scroll-container" id="scrollContainer">
        <div class="scroll-parchment" id="scrollParchment">
          <button class="btn-close-scroll" ontouchstart="safeApp.close()" onclick="safeApp.close()">✕ 收起</button>
          <div class="scroll-text" id="scrollText"></div>
          <div class="scroll-badge" id="scrollBadge">⚜</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== 系統級防護 (雙指縮放、連點放大等防護維持原樣) =====
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    var now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) { e.preventDefault(); }
    lastTouchEnd = now;
  }, false);
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('keydown', function(e) {
    const forbiddenKeys = ['F5', 'BrowserBack', 'BrowserForward'];
    if (forbiddenKeys.includes(e.key) || (e.ctrlKey && ['r', 'R'].includes(e.key)) || (e.metaKey && ['r', 'R'].includes(e.key))) { e.preventDefault(); }
  });

  window.safeApp = (function() {
    var BOXES = [
      { title: '視聽教室', code1: '1750', text1: 'It is tall, and by a flag.', code2: '3304', text2: 'This place is full of tradition, and it\'s made of stone.', theme: '#b8956a' },
      { title: 'Watch Tower', code1: '9123', text1: 'There are many cats here.', code2: '1200', text2: 'Every noon, the place smells yummy.', theme: '#5a7a9a' },
      { title: 'Parking Lot', code1: '1200', text1: 'Every noon, the place smells yummy.', code2: '4194', text2: '恭喜你完成所有的考驗，請回到視聽教室。', theme: '#8a4a4a' },
      { title: 'Kitchen', code1: '3304', text1: 'This place is full of tradition, and it\'s made of stone.', code2: '9123', text2: 'There are many cats here.', theme: '#8a8a8a' },
      { title: 'Slate Stone House', code1: '3058', text1: 'There are so many waterbottles.', code2: '8879', text2: 'There is a story on the wall.', theme: '#6a6a6a' },
      { title: 'Trash Area', code1: '8879', text1: 'There is a story on the wall.', code2: '1750', text2: 'It is tall, and by a flag.', theme: '#4a7a4a' },
      { title: 'Court', code1: '4194', text1: '恭喜你完成所有的考驗，請回到視聽教室。', code2: '3058', text2: 'There are so many waterbottles.', theme: '#7a5a8a' }
    ];

    var state = {
      boxIndex: -1,
      digits: [0, 0, 0, 0],
      isUnlocked: false,
      isOpen: false,
      lastAction: 0,
      rivetCount: 0,
      rivetTimer: null,
      autoCloseTimer: null,
      errorTimer: null
    };

    function canAct() {
      var now = Date.now();
      if (now - state.lastAction < 150) return false;
      state.lastAction = now;
      return true;
    }

    function getEl(id) { return document.getElementById(id); }

    function updateDisplay() {
      getEl('d0').textContent = state.digits[0];
      getEl('d1').textContent = state.digits[1];
      getEl('d2').textContent = state.digits[2];
      getEl('d3').textContent = state.digits[3];
    }

    function setBorderColor(color) {
      getEl('wheelPanel').style.borderColor = color;
      var wContainers = document.querySelectorAll('.wheel-container');
      for(var i=0; i<wContainers.length; i++) wContainers[i].style.borderColor = color;
    }

    function closeScrollLogic(force) {
      if (state.autoCloseTimer) clearTimeout(state.autoCloseTimer);
      if (!state.isOpen && !force) return;

      getEl('safeInterior').classList.remove('active');
      getEl('scrollContainer').classList.remove('active');
      
      setTimeout(function() {
        getEl('safeDoor').classList.remove('open');
        state.isOpen = false;
        state.isUnlocked = false;
        getEl('btnOpen').disabled = false;
        var msg = getEl('statusMsg');
        msg.className = 'status-msg';
        msg.textContent = '請輸入密碼';
        state.digits = [0, 0, 0, 0];
        updateDisplay();
        
        if (state.boxIndex >= 0) {
           setBorderColor(BOXES[state.boxIndex].theme);
        }
      }, force ? 0 : 500);
    }

    return {
      goBox: function(idx) {
        if (!canAct()) return;
        
        // 【核心更新】將選取的寶箱存入本機離線記憶體
        try { localStorage.setItem('wutai_box_memory', idx); } catch(e) {}

        closeScrollLogic(true);
        state.isUnlocked = false;
        state.isOpen = false;
        getEl('btnOpen').disabled = false;
        getEl('statusMsg').className = 'status-msg';
        getEl('statusMsg').textContent = '請輸入密碼';
        state.digits = [0, 0, 0, 0];
        updateDisplay();

        getEl('safeDoor').classList.remove('open');
        getEl('safeInterior').classList.remove('active');
        getEl('scrollContainer').classList.remove('active');

        state.boxIndex = idx;
        var box = BOXES[idx];
        getEl('safeTitle').textContent = box.title;
        getEl('safeTitle').style.color = box.theme;
        setBorderColor(box.theme);

        getEl('menuView').classList.add('hidden');
        getEl('safeView').classList.remove('hidden');
      },
      
      spin: function(idx, delta) {
        if (!canAct() || state.isUnlocked || state.isOpen) return;
        var newVal = (state.digits[idx] + delta) % 10;
        if (newVal < 0) newVal += 10;
        state.digits[idx] = newVal;
        updateDisplay();
        getEl('statusMsg').className = 'status-msg';
        getEl('statusMsg').textContent = '請輸入密碼';
      },
      
      tryOpen: function() {
        if (!canAct() || state.isUnlocked || state.isOpen || state.boxIndex < 0) return;
        var code = state.digits.join('');
        
        // 老師使用密碼 9999 退回總覽
        if (code === '9999') {
          // 【核心更新】清除離線記憶體
          try { localStorage.removeItem('wutai_box_memory'); } catch(e) {}
          closeScrollLogic(true);
          getEl('menuView').classList.remove('hidden');
          getEl('safeView').classList.add('hidden');
          return;
        }

        var box = BOXES[state.boxIndex];
        var matched = false;
        var isBlue = false;
        
        if (code === box.code1) { matched = true; isBlue = true; } 
        else if (code === box.code2) { matched = true; isBlue = false; }

        if (matched) {
          if (state.errorTimer) clearTimeout(state.errorTimer);
          state.isUnlocked = true;
          getEl('statusMsg').className = 'status-msg success';
          getEl('statusMsg').textContent = '✅ 寶箱開啟！';
          getEl('btnOpen').disabled = true;

          getEl('scrollText').textContent = isBlue ? box.text1 : box.text2;
          getEl('scrollBadge').className = 'scroll-badge ' + (isBlue ? 'blue' : 'red');

          setTimeout(function() {
            getEl('safeDoor').classList.add('open');
            setTimeout(function() {
              getEl('safeInterior').classList.add('active');
              getEl('scrollContainer').classList.add('active');
              state.autoCloseTimer = setTimeout(function() { closeScrollLogic(false); }, 15000);
            }, 900);
            state.isOpen = true;
          }, 500);
          
        } else {
          getEl('statusMsg').textContent = '❌ 密碼錯誤';
          getEl('statusMsg').className = 'status-msg error';
          setBorderColor('#b33a2a');
          
          setTimeout(function() { setBorderColor(box.theme); }, 800);
          
          clearTimeout(state.errorTimer);
          state.errorTimer = setTimeout(function() {
            getEl('statusMsg').className = 'status-msg';
            getEl('statusMsg').textContent = '請輸入密碼';
          }, 1500);
        }
      },
      
      close: function() {
        if (!canAct()) return;
        closeScrollLogic(false);
      },
      
      tapRivet: function() {
        if (!canAct() || state.boxIndex < 0) return;
        state.rivetCount++;
        clearTimeout(state.rivetTimer);
        state.rivetTimer = setTimeout(function() { state.rivetCount = 0; }, 1000);
        
        if (state.rivetCount >= 5) {
          state.rivetCount = 0;
          clearTimeout(state.rivetTimer);
          // 【核心更新】清除離線記憶體
          try { localStorage.removeItem('wutai_box_memory'); } catch(e) {}
          closeScrollLogic(true);
          getEl('menuView').classList.remove('hidden');
          getEl('safeView').classList.add('hidden');
        }
      }
    };
  })();

  // ==========================================
  // ===== 網頁載入時的「自動還原記憶」機制 =====
  // ==========================================
  (function() {
    try {
      var savedBox = localStorage.getItem('wutai_box_memory');
      if (savedBox !== null && savedBox !== '') {
        // 如果發現記憶體有紀錄，立刻跳轉到該寶箱，不顯示總覽頁
        window.safeApp.goBox(parseInt(savedBox, 10));
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
